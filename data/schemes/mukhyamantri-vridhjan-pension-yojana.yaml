name_en: Mukhyamantri Vridhjan Pension Yojana
name_hi: मुख्यमंत्री वृद्धजन पेंशन योजना
department_en: Social Welfare Department, Government of Bihar
department_hi: समाज कल्याण विभाग, बिहार सरकार
department_website: https://state.bihar.gov.in/socialwelfare
categories:
  - social_welfare
objective_en: Monthly social-security pension for elderly residents of Bihar.
objective_hi: बिहार के वृद्ध निवासियों हेतु मासिक सामाजिक-सुरक्षा पेंशन।
eligibility_en: >-
  Permanent resident of Bihar aged 60 or above, not a retired government employee and not receiving
  any other government/family/social-security pension.
eligibility_hi: >-
  बिहार का स्थायी निवासी, आयु 60 वर्ष या अधिक, जो सेवानिवृत्त सरकारी कर्मचारी न हो एवं किसी अन्य
  सरकारी/पारिवारिक/सामाजिक-सुरक्षा पेंशन का लाभार्थी न हो।
benefit_type: Monthly pension (DBT)
benefit_detail: ₹1,100 per month (raised from ₹400/₹500 in July 2025), paid by DBT on the 10th of each month.
target_beneficiary: Senior citizens (60+) of Bihar.
personas:
