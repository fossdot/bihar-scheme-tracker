name_en: BSDM Domain Skilling Program (Bihar Skill Development Mission)
name_hi: बिहार कौशल विकास मिशन - डोमेन स्किलिंग कार्यक्रम
department_en: >-
  Labour Resources Department, Government of Bihar (implemented by Bihar Skill Development Mission,
  Patna)
department_hi: श्रम संसाधन विभाग, बिहार सरकार (बिहार कौशल विकास मिशन, पटना द्वारा कार्यान्वित)
categories:
  - skilling
  - employment
objective_en: >-
  Provide employment-linked, sector-specific (domain) vocational skill training to Bihar's youth
  beyond the foundational Kushal Yuva Program, building a standardised, ICT-monitored skill
  ecosystem with placement facilitation; includes dedicated tracks for PwD/Divyangjan and
  transgender candidates.
objective_hi: >-
  कुशल युवा कार्यक्रम से आगे बढ़कर बिहार के युवाओं को रोजगार-संबद्ध, क्षेत्र-विशिष्ट (डोमेन)
  व्यावसायिक कौशल प्रशिक्षण देना, साथ ही प्लेसमेंट सहायता तथा दिव्यांग एवं ट्रांसजेंडर हेतु समर्पित
  ट्रैक।
eligibility_en: >-
  Bihar-resident youth seeking sector-specific skilling (general domain skilling builds on KYP-type
  foundational eligibility); a dedicated PwD/Divyangjan and transgender track covers candidates aged
  15-59. Apply via the BSDM portal.
eligibility_hi: >-
  क्षेत्र-विशिष्ट कौशल चाहने वाले बिहार-निवासी युवा; दिव्यांग/ट्रांसजेंडर हेतु समर्पित ट्रैक 15–59
  आयु के अभ्यर्थियों को कवर करता है। BSDM पोर्टल पर आवेदन।
benefit_type: training
benefit_detail: >-
  Free job-oriented domain/sector-specific skill training through empanelled Training Partners,
  government-recognised certification on completion, and placement assistance into relevant sectors.
  Dedicated PwD and transgender skilling tracks are being empanelled.
target_beneficiary: Bihar youth (sector skilling)
personas:
  - unemployed_youth
education_levels: []
gender_eligibility: any
