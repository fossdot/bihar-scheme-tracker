status: likely_active
status_evidence: >-
  Bihar Skill Development Mission's official portal lists Domain Skilling as a flagship program
  alongside KYP; recent BSDM Requests for Proposal to empanel Training Partners for Domain Skilling
  and for PwD/Transgender skilling (RFP cycles up to 2026) indicate active procurement and ongoing
  operation. Current-FY budget allocation not separately confirmed from budget.bihar.gov.in, hence
  likely_active. Distinct from Kushal Yuva Program already in catalogue.
