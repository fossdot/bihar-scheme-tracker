status: likely_active
status_evidence: >-
  Likely active — the official FSY portal (pacsonline.bih.nic.in/fsy) is the live registration
  system and the scheme runs each season (Kharif 2025 window ~20 Aug–31 Oct 2025). Reported
  ₹7,500/ha (loss ≤20%) / ₹10,000/ha (loss >20%), up to 2 hectares. No current-season official
  notification was fetched, so not upgraded to active. Verified 2026-06-19. Source:
  https://pacsonline.bih.nic.in/fsy/login.aspx
