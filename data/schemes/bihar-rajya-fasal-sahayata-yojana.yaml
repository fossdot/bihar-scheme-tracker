name_en: Bihar Rajya Fasal Sahayata Yojana
name_hi: बिहार राज्य फसल सहायता योजना
department_en: Department of Agriculture, Government of Bihar
department_hi: कृषि विभाग, बिहार सरकार
department_website: https://dbtagriculture.bihar.gov.in
categories:
  - agriculture
objective_en: >-
  Financial assistance to farmers for crop loss from natural calamities (state crop-protection
  scheme).
objective_hi: प्राकृतिक आपदाओं से फसल क्षति पर किसानों को वित्तीय सहायता (राज्य फसल-सुरक्षा योजना)।
eligibility_en: Raiyat and non-Raiyat farmers of Bihar registered for the scheme.
eligibility_hi: योजना हेतु पंजीकृत बिहार के रैयत व गैर-रैयत किसान।
benefit_type: Crop-loss assistance
benefit_detail: >-
  Reported ₹7,500/ha (loss up to 20%) or ₹10,000/ha (loss above 20%), up to 2 hectares per farmer.
  Verify current-season rates.
target_beneficiary: Farmers of Bihar with crop loss.
personas:
  - farmer
