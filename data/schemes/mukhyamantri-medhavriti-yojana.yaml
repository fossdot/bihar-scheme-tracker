  - women_child
objective_en: Merit incentive for SC/ST girl students who pass Class 12.
objective_hi: 12वीं उत्तीर्ण करने वाली SC/ST छात्राओं हेतु मेधा प्रोत्साहन।
eligibility_en: SC/ST girls of Bihar passing Class 12 from a recognised board.
eligibility_hi: मान्यता प्राप्त बोर्ड से 12वीं उत्तीर्ण बिहार की SC/ST छात्राएँ।
benefit_type: Cash incentive
benefit_detail: Reported ₹15,000 (1st division) / ₹10,000 (2nd division). Verify at the portal.
target_beneficiary: SC/ST girl students of Bihar.
