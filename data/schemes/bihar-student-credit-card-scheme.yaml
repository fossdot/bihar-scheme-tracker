name_en: Bihar Student Credit Card Scheme
name_hi: बिहार स्टूडेंट क्रेडिट कार्ड योजना
department_en: Saat Nischay — Yuva Upmission (Government of Bihar)
department_hi: सात निश्चय — युवा उपमिशन (बिहार सरकार)
department_website: https://www.7nishchay-yuvaupmission.bihar.gov.in/
categories:
  - education
launch_date: '2016-10-02'
objective_en: >-
  Financial support, through the banking system, for students from Bihar who have passed class 12
  (Intermediate) but cannot pursue higher education due to financial constraints.
objective_hi: >-
  बैंकिंग प्रणाली के माध्यम से बिहार के उन विद्यार्थियों को वित्तीय सहायता जिन्होंने 12वीं
  (इंटरमीडिएट) उत्तीर्ण की है परन्तु आर्थिक कारणों से उच्च शिक्षा प्राप्त नहीं कर पा रहे हैं।
eligibility_en: >-
  Permanent resident of Bihar who has passed Intermediate/class 12 from a Bihar
  government-recognised institution and intends to pursue higher education.
eligibility_hi: >-
  बिहार का स्थायी निवासी जिसने राज्य सरकार से मान्यता प्राप्त संस्थान से इंटरमीडिएट/12वीं उत्तीर्ण
  की हो और उच्च शिक्षा प्राप्त करना चाहता हो।
benefit_type: Education loan
benefit_detail: >-
  Education loan up to ₹4 lakh for higher studies — now interest-free for all categories (Sept 2025
  reform; previously 4% general / 1% for women & PwD). Repayment extended to 7 yrs (≤₹2L) or 10 yrs
  (>₹2L). Processed via the DRCC.
target_beneficiary: Students from Bihar who have passed class 12 and intend to pursue higher education.
personas:
  - student
education_levels:
  - senior_secondary
gender_eligibility: any
social_categories: []
min_age: null
max_age: null
income_ceiling: null
requires_bpl: false
domicile: bihar
is_for_disabled: false
is_for_startups: false
land_ownership: null
status: active
