objective_en: >-
  Monthly maintenance for orphans, semi-orphans and children of HIV-positive or severely disabled
  parents.
objective_hi: अनाथ, अर्ध-अनाथ एवं HIV-संक्रमित या गंभीर दिव्यांग माता-पिता के बच्चों हेतु मासिक भरण-पोषण।
eligibility_en: Eligible vulnerable children of Bihar up to age 18 (per scheme criteria).
eligibility_hi: योजना मानदंड अनुसार बिहार के पात्र संवेदनशील बच्चे, 18 वर्ष तक।
benefit_type: Monthly maintenance (DBT)
benefit_detail: >-
  ₹1,000/month per eligible child (0–18) — orphans, HIV/leprosy/cancer-affected, and children of
  widows or disabled parents. Paid via DBT.
target_beneficiary: Orphans/vulnerable children of Bihar.
