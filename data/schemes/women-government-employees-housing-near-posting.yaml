objective_en: >-
  Provide safe, affordable rental accommodation to women state-government employees at or near their
  place of posting — especially those serving in rural and block-level offices — to improve their
  safety and convenience. Where government quarters are unavailable, the state leases private
  housing for them.
objective_hi: >-
  महिला राज्य-सरकारी कर्मियों को उनके पदस्थापन स्थल पर या उसके निकट सुरक्षित एवं किफायती किराया आवास
  उपलब्ध कराना — विशेषकर ग्रामीण एवं प्रखंड-स्तरीय कार्यालयों में कार्यरत महिलाओं को — ताकि उनकी
  सुरक्षा एवं सुविधा बढ़े। जहाँ सरकारी आवास उपलब्ध न हो, वहाँ सरकार उनके लिए निजी आवास पट्टे पर लेगी।
eligibility_en: >-
  Women employees of the Bihar state government posted in the state — reported to include
  schoolteachers, women officers and staff, police personnel, and women working from the panchayat
  level up to the secretariat. Priority emphasis on those posted at rural / block-level offices.
  Employees opting for this government-provided accommodation forgo House Rent Allowance (HRA).
eligibility_hi: >-
  बिहार राज्य सरकार की महिला कर्मी जो राज्य में पदस्थापित हैं — समाचारों के अनुसार इसमें शिक्षिकाएँ,
  महिला अधिकारी एवं कर्मचारी, पुलिसकर्मी, तथा पंचायत स्तर से सचिवालय तक कार्यरत महिलाएँ शामिल हैं।
  ग्रामीण / प्रखंड-स्तरीय कार्यालयों में पदस्थापित महिलाओं को प्राथमिकता। यह सरकारी आवास चुनने वाली
  कर्मी मकान किराया भत्ता (HRA) नहीं लेंगी।
benefit_type: Leased rental accommodation (in lieu of HRA)
benefit_detail: >-
  Rent-free or government-leased private accommodation near the employee's posting, arranged by a
  district-level committee chaired by the District Magistrate, which identifies suitable buildings
  (with electricity, water, sanitation and structural safety) and executes lease agreements with
  landlords; the Sub-Divisional Officer (SDO) finalises the rent and handles grievances. Rollout is
  phased — beginning at district and divisional headquarters before expanding. Specific rent
  ceilings have not been published.
target_beneficiary: Women employees of the Bihar state government, especially those in rural/block-level postings.
