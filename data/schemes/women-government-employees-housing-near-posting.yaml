name_en: Housing Accommodation for Women Government Employees (near place of posting)
name_hi: महिला सरकारी कर्मियों हेतु आवास सुविधा (पदस्थापन स्थल के निकट)
department_en: Government of Bihar (Cabinet-approved; implemented via district administration / DM-led committees)
department_hi: बिहार सरकार (कैबिनेट द्वारा स्वीकृत; जिला प्रशासन / डीएम की अध्यक्षता वाली समितियों द्वारा क्रियान्वित)
