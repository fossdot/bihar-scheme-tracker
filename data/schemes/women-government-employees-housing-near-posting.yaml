status_evidence: >-
  Likely active — approved by the Bihar Cabinet on 10 June 2025 (chaired by CM Nitish Kumar) to
  provide accommodation near posting for ~4 lakh women government employees. As of verification the
  scheme is in early rollout: implementing departments are to begin formalities, district committees
  and landlord expressions-of-interest are the delivery mechanism, and no application portal,
  budget line, or formal operating guidelines have been published yet. No official government
  notification/PDF located — sourced from news coverage of the cabinet decision; replace source_url
  with the official notification when available. Verified 2026-06-25.
