name_en: Bihar Diesel Anudan Yojana
name_hi: बिहार डीज़ल अनुदान योजना
department_en: Department of Agriculture, Government of Bihar
department_hi: कृषि विभाग, बिहार सरकार
department_website: https://dbtagriculture.bihar.gov.in
categories:
  - agriculture
objective_en: Diesel subsidy to farmers for irrigating standing crops during dry spells.
objective_hi: सूखे के दौरान खड़ी फसलों की सिंचाई हेतु किसानों को डीज़ल अनुदान।
eligibility_en: >-
  Farmers of Bihar (Raiyat/non-Raiyat) registered on the Agriculture DBT portal, during a notified
  drought/dry spell.
eligibility_hi: अधिसूचित सूखा/शुष्क अवधि में कृषि DBT पोर्टल पर पंजीकृत बिहार के किसान (रैयत/गैर-रैयत)।
benefit_type: Diesel subsidy (DBT)
benefit_detail: >-
  Per-irrigation-round diesel subsidy (rate notified each season; reported ~₹750/acre per round,
  e.g. ~₹1,500/acre for paddy).
target_beneficiary: Farmers of Bihar during dry spells.
