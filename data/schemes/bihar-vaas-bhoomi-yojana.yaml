objective_en: Free homestead land to landless rural poor families (priority to Mahadalit/SC/ST).
objective_hi: भूमिहीन ग्रामीण निर्धन परिवारों को नि:शुल्क वास भूमि (महादलित/SC/ST को प्राथमिकता)।
eligibility_en: Landless rural BPL families of Bihar without homestead land.
eligibility_hi: वास भूमि से वंचित बिहार के भूमिहीन ग्रामीण BPL परिवार।
benefit_type: Homestead land title
benefit_detail: >-
  Free homestead plot of up to 5 decimal (basgeet parcha) to a landless family; where no government
  land is available, ₹1 lakh cash to buy a plot.
target_beneficiary: Landless rural BPL families.
