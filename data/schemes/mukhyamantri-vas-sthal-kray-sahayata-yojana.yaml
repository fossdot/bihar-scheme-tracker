status_evidence: >-
  Listed as a live scheme on the Government of India myScheme portal
  (myscheme.gov.in/schemes/mmvsksy, Rural Development Dept, Bihar) and widely referenced in 2025
  state sources as currently open. No current-FY Bihar Rural Development budget allocation confirmed
  — classed likely_active. Benefit amount discrepancy (Rs. 60,000 on myScheme vs Rs. 1 lakh in some
  2025 news) flagged for re-verification against an RD notification. Distinct from Bihar Vaas Bhoomi
  Yojana (Revenue & Land Reforms free land grant — different dept and mechanism).
