name_en: Craftsmen Training Scheme (CTS) — ITI
name_hi: शिल्पकार प्रशिक्षण योजना (ITI)
department_en: >-
  Ministry of Skill Development and Entrepreneurship, Government of India; implemented in Bihar by
  the Directorate of Technical Education / ITI network
department_hi: >-
  कौशल विकास एवं उद्यमिता मंत्रालय, भारत सरकार; बिहार में तकनीकी शिक्षा निदेशालय / ITI नेटवर्क
  द्वारा कार्यान्वित
categories:
  - skilling
  - employment
  - education
objective_en: >-
  Provide NSQF-compliant long-duration vocational training across ~150 engineering and
  non-engineering trades through Industrial Training Institutes (ITIs), producing certified
  craftsmen/tradespeople for industry and self-employment.
objective_hi: >-
  औद्योगिक प्रशिक्षण संस्थाओं (ITI) के माध्यम से ~150 इंजीनियरिंग एवं गैर-इंजीनियरिंग ट्रेडों में
  NSQF-अनुरूप दीर्घकालिक व्यावसायिक प्रशिक्षण प्रदान कर उद्योग एवं स्वरोजगार के लिए प्रमाणित
  शिल्पकार/ट्रेड-कर्मी तैयार करना।
eligibility_en: >-
  Youth seeking trade/craftsman skills; admission through ITIs with trade- and duration-specific
  entry requirements (generally Class 8 or Class 10 pass depending on trade); minimum age 14. Open
  to Bihar residents through government and private ITIs across the state.
eligibility_hi: >-
  कौशल/शिल्पकार प्रशिक्षण चाहने वाले युवा; ITI में ट्रेड एवं अवधि के अनुसार प्रवेश (सामान्यतः कक्षा
  8 या 10 उत्तीर्ण, ट्रेड-अनुसार); न्यूनतम आयु 14 वर्ष। बिहार के सरकारी एवं निजी ITI के माध्यम से
  बिहार निवासियों हेतु।
benefit_type: training
benefit_detail: >-
  Long-duration (6 months to 2 years) NSQF-compliant vocational training across ~150 engineering and
  non-engineering trades (including dedicated trades for women and PwDs), leading to a National
  Trade Certificate (NTC) recognised by industry and government. Training at government and private
  ITIs with workshops, tools and equipment provided.
target_beneficiary: Youth (14+) seeking trade/vocational certification
personas:
  - unemployed_youth
  - student
education_levels:
  - secondary
gender_eligibility: any
social_categories: []
min_age: 14
max_age: null
income_ceiling: null
requires_bpl: false
domicile: any
is_for_disabled: false
is_for_startups: false
land_ownership: null
status: active
status_evidence: >-
  Fetched official Bihar Technical Education (det.bihar.gov.in/cts.html) page confirming CTS
  operates through the Bihar ITI network; MSDE/DGT national scheme with active admissions across
  ~15,000 ITIs nationwide including in Bihar. NTC certification is government-recognised.
source_url: https://det.bihar.gov.in/cts.html
application_portal_url: https://www.apprenticeshipindia.gov.in/
last_verified: '2026-06-22'
