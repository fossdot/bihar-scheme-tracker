name_en: Chief Minister Medical Relief Fund (Bihar)
name_hi: मुख्यमंत्री चिकित्सा सहायता कोष
department_en: Government of Bihar (administered via Bihar Bhawan, New Delhi; Chief Minister's Office)
department_hi: बिहार सरकार (बिहार भवन, नई दिल्ली के माध्यम से प्रशासित; मुख्यमंत्री कार्यालय)
categories:
  - health
  - social_welfare
objective_en: >-
  Provide medical financial aid to Bihar residents for the treatment of certain serious ailments at
  empanelled hospitals, including treatment outside Bihar.
objective_hi: >-
  बिहार के निवासियों को कुछ गंभीर बीमारियों के उपचार हेतु, बिहार के बाहर सहित, सूचीबद्ध अस्पतालों
  में चिकित्सा वित्तीय सहायता प्रदान करना।
eligibility_en: >-
  Bihar residents with annual family income less than ₹2,50,000, for treatment of certain serious
  ailments at CGHS-empanelled hospitals.
eligibility_hi: >-
  वार्षिक पारिवारिक आय 2,50,000 रु. से कम वाले बिहार निवासी, CGHS-सूचीबद्ध अस्पतालों में कुछ गंभीर
  बीमारियों के उपचार हेतु।
benefit_type: financial assistance
benefit_detail: >-
  Medical financial assistance toward treatment of specified serious ailments at CGHS-empanelled
  hospitals (including hospitals outside Bihar, for which aid can be applied for and availed at
  Bihar Bhawan, New Delhi). Exact per-case ceiling and full disease list not stated on the page
  fetched.
target_beneficiary: Bihar residents (serious illness, income < ₹2.5L)
