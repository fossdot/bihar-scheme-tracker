name_en: Bihar Nishulk Coaching Yojana
name_hi: बिहार नि:शुल्क कोचिंग योजना
department_en: Social Welfare Department, Government of Bihar
department_hi: समाज कल्याण विभाग, बिहार सरकार
department_website: https://state.bihar.gov.in/socialwelfare
categories:
  - education
  - skilling
objective_en: Free competitive-exam coaching for SC/ST/EBC/OBC/minority students from low-income families.
objective_hi: >-
  निम्न-आय परिवारों के SC/ST/EBC/OBC/अल्पसंख्यक विद्यार्थियों हेतु नि:शुल्क प्रतियोगी-परीक्षा
  कोचिंग।
eligibility_en: Bihar-resident SC/ST/EBC/OBC/minority students with family income below ₹3 lakh/year.
eligibility_hi: बिहार निवासी SC/ST/EBC/OBC/अल्पसंख्यक विद्यार्थी जिनकी पारिवारिक आय ₹3 लाख/वर्ष से कम हो।
benefit_type: Free coaching + stipend
benefit_detail: >-
  Free competitive-exam (UPSC/BPSC/SSC) coaching with a monthly stipend (reported ₹1,500 for local /
  ₹3,000 for outstation students).
target_beneficiary: Low-income SC/ST/EBC/OBC/minority students.
