name_en: Pradhan Mantri Jan Dhan Yojana (PMJDY)
name_hi: प्रधानमंत्री जन धन योजना (PMJDY)
department_en: Government of India (Central Scheme)
department_hi: भारत सरकार (केंद्रीय योजना)
department_website: https://www.india.gov.in
categories:
  - financial_inclusion
objective_en: Universal access to a basic bank account with overdraft, insurance and DBT linkage.
objective_hi: ओवरड्राफ्ट, बीमा एवं DBT लिंकेज सहित बुनियादी बैंक खाते तक सार्वभौमिक पहुँच।
eligibility_en: Any Indian resident without a bank account (zero-balance account).
eligibility_hi: बिना बैंक खाते वाला कोई भी भारतीय निवासी (शून्य-शेष खाता)।
benefit_type: Zero-balance bank account
benefit_detail: >-
  Zero-balance account with RuPay card, overdraft up to ₹10,000, and ₹2 lakh accidental insurance
  cover.
target_beneficiary: Unbanked residents.
