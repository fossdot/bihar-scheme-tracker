name_en: Pradhan Mantri Jeevan Jyoti Bima Yojana (PMJJBY)
name_hi: प्रधानमंत्री जीवन ज्योति बीमा योजना (PMJJBY)
department_en: Government of India (Central Scheme)
department_hi: भारत सरकार (केंद्रीय योजना)
