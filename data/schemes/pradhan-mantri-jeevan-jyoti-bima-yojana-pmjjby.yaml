objective_en: Affordable life-insurance cover via a bank account.
objective_hi: बैंक खाते के माध्यम से किफायती जीवन बीमा।
eligibility_en: Bank account holders aged 18–50 who auto-debit the premium.
eligibility_hi: 18–50 आयु के बैंक खाताधारक जो प्रीमियम ऑटो-डेबिट करें।
benefit_type: Life insurance
benefit_detail: >-
  Life cover of ₹2 lakh for an annual premium of ₹436 (revised 2022); bank-account holders aged
  18–50.
target_beneficiary: Bank account holders (18–50).
