name_en: Pradhan Mantri Kaushal Vikas Yojana (PMKVY)
name_hi: प्रधानमंत्री कौशल विकास योजना (PMKVY)
department_en: Government of India (Central Scheme)
department_hi: भारत सरकार (केंद्रीय योजना)
department_website: https://www.india.gov.in
categories:
  - skilling
  - employment
objective_en: Short-term skill training and certification for youth to improve employability.
objective_hi: रोज़गार-योग्यता बढ़ाने हेतु युवाओं को अल्पकालिक कौशल प्रशिक्षण व प्रमाणन।
eligibility_en: Indian youth (typically 15–45) seeking skill training; criteria vary by job role.
eligibility_hi: कौशल प्रशिक्षण चाहने वाले भारतीय युवा (सामान्यतः 15–45); भूमिका अनुसार मानदंड।
benefit_type: Free skill training + certification
benefit_detail: >-
  Free NSQF-aligned training, assessment and certification (placement support). Verify current
  terms.
target_beneficiary: Youth seeking skills.
personas:
  - unemployed_youth
education_levels: []
gender_eligibility: any
social_categories: []
min_age: null
max_age: null
income_ceiling: null
requires_bpl: false
domicile: any
is_for_disabled: false
is_for_startups: false
land_ownership: null
status: active
status_evidence: >-
  Active — PMKVY 4.0 runs under the restructured Skill India Programme (Cabinet, Feb 2025) through
  FY2025-26, relaunch confirmed Mar 2026; free NSQF training + certification (also on
  skillindiadigital.gov.in). Verified 2026-06-19. Source: https://www.pmkvyofficial.org/
source_url: https://www.pmkvyofficial.org
application_portal_url: https://www.pmkvyofficial.org
