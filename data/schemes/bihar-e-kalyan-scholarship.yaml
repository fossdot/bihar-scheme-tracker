name_en: Bihar e-Kalyan Scholarship
name_hi: बिहार ई-कल्याण छात्रवृत्ति
department_en: Social Welfare Department, Government of Bihar
department_hi: समाज कल्याण विभाग, बिहार सरकार
department_website: https://state.bihar.gov.in/socialwelfare
categories:
  - education
objective_en: Post-matric scholarships for SC/ST/BC/EBC and minority students pursuing higher studies.
objective_hi: उच्च शिक्षा हेतु SC/ST/BC/EBC एवं अल्पसंख्यक विद्यार्थियों के लिए पोस्ट-मैट्रिक छात्रवृत्ति।
eligibility_en: >-
  Bihar-resident SC/ST/BC/EBC/minority students from Class 11 to PhD; income limits apply per
  category (verify at e-Kalyan).
eligibility_hi: >-
  बिहार निवासी SC/ST/BC/EBC/अल्पसंख्यक विद्यार्थी, कक्षा 11 से पीएचडी तक; श्रेणी अनुसार आय-सीमा
  (e-Kalyan पर सत्यापित करें)।
benefit_type: Scholarship
benefit_detail: >-
  Tuition fees + annual maintenance (reported ₹2,000–₹25,000+/year by level). Verify current rates
  at the portal.
target_beneficiary: SC/ST/BC/EBC/minority students of Bihar.
