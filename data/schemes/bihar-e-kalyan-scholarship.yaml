status_evidence: >-
  Active — Bihar Post-Matric Scholarship (SC/ST/BC/EBC) operational for 2025-26 (fresh applications
  ~Sept–Nov 2025, correction window to 25 Dec 2025). Tuition + maintenance, Class 11 to
  graduation/PG/professional. Income limit ₹2.5 lakh for BC/EBC; no income bar for SC/ST. For
  2025-26, post-matric applications run via pmsonline.bihar.gov.in; status/history via e-Kalyan.
  Verified 2026-06-19. Source: https://ekalyan.bih.nic.in/
