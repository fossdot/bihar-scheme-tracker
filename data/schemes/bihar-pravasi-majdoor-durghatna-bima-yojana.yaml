eligibility_hi: बिहार के पंजीकृत प्रवासी मज़दूर।
benefit_type: Accident insurance
benefit_detail: >-
  For migrant-worker accidents outside Bihar/abroad (within 180 days): ₹4 lakh on death, ₹1 lakh for
  permanent full disability, ₹50,000 for permanent partial disability — paid by RTGS.
