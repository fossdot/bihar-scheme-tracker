objective_en: Free electricity connection to every un-electrified household in Bihar.
objective_hi: बिहार के प्रत्येक अविद्युतीकृत घर को नि:शुल्क बिजली कनेक्शन।
eligibility_en: Un-electrified households in Bihar (BPL households get free connection).
