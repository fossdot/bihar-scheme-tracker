name_en: Jan Shikshan Sansthan (JSS) Scheme
name_hi: जन शिक्षण संस्थान योजना
department_en: Ministry of Skill Development and Entrepreneurship, Government of India
department_hi: कौशल विकास एवं उद्यमिता मंत्रालय, भारत सरकार
categories:
  - skilling
  - education
  - social_welfare
objective_en: >-
  Provide vocational and technical training to non-literates, neo-literates, and school dropouts
  (especially women) from weaker sections in rural and urban areas, to improve their livelihood
  through skill development.
objective_hi: >-
  ग्रामीण एवं शहरी क्षेत्रों के कमज़ोर वर्गों के निरक्षर, नव-साक्षर एवं स्कूल छोड़ चुके व्यक्तियों
  (विशेषकर महिलाओं) को व्यावसायिक एवं तकनीकी प्रशिक्षण देकर कौशल-विकास के माध्यम से उनकी आजीविका में
  सुधार करना।
eligibility_en: >-
  Non-literates, neo-literates and persons with rudimentary education / school dropouts up to class
  12, generally aged 15-45, from weaker sections; special focus on women, SC/ST and minority
  communities. Implemented through JSS institutes in districts across Bihar.
eligibility_hi: >-
  निरक्षर, नव-साक्षर एवं प्राथमिक/माध्यमिक शिक्षा तक के व्यक्ति (कक्षा 12 तक स्कूल छोड़ चुके),
  सामान्यतः 15-45 आयु, कमज़ोर वर्गों से; महिलाओं, SC/ST एवं अल्पसंख्यकों पर विशेष ध्यान। बिहार के
  जिलों में JSS संस्थाओं के माध्यम से कार्यान्वित।
benefit_type: training
benefit_detail: >-
  Free or heavily subsidised short vocational courses (typically 2-6 months) in trades such as
  tailoring, beauty culture, food processing, electrical work, plumbing, and mobile repair. Training
  delivered locally through Jan Shikshan Sansthan institutes established in districts.
target_beneficiary: Non-literate / school-dropout adults (esp. women, weaker sections)
personas:
  - unemployed_youth
  - worker_labourer
education_levels:
  - none
  - primary
  - secondary
gender_eligibility: any
social_categories: []
min_age: 15
max_age: 45
income_ceiling: null
requires_bpl: false
domicile: any
is_for_disabled: false
is_for_startups: false
land_ownership: null
status: active
status_evidence: >-
  Official MSDE scheme page
  (msde.gov.in/offerings/schemes-and-services/details/jan-shikshan-sansthan-jss) lists JSS as a
  current MSDE scheme with established institutes nationwide including Bihar. PIB and Union Budget
  documents confirm JSS continuation with allocations through 2025-26. Active JSS institutes operate
  in Bihar districts.
source_url: https://www.msde.gov.in/offerings/schemes-and-services/details/jan-shikshan-sansthan-jss
last_verified: '2026-06-22'
