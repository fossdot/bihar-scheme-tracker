is_for_disabled: false
is_for_startups: false
land_ownership: null
status: active
status_evidence: >-
  Active — official 7nishchay portal lists KYP live under the Bihar Skill Development Mission
  (240-hour training: communication, basic computer, soft skills; free). Eligibility 15–28
  (relaxations: SC/ST & PwD to 33, OBC to 31), 10th-pass. Verified 2026-06-19. Source:
  https://www.7nishchay-yuvaupmission.bihar.gov.in/
