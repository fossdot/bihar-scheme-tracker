status: active
status_evidence: >-
  Active — launched 26 Sept 2025 (₹7,500 cr scheme): a ONE-TIME ₹10,000 grant per woman by DBT, with
  an optional second-stage top-up up to ₹2 lakh for viable ventures after ~6 months. Delivered
  through JEEViKA / urban SHGs (Rural Development Dept); 1.1+ crore women selected (₹10,000 to 21
  lakh more on 6 Oct 2025). [Corrected: was stored as a ₹10,000/month stipend — it is a one-time
  grant.] Verified 2026-06-19. Source:
  https://www.pmindia.gov.in/en/news_updates/pm-launches-bihars-mukhyamantri-mahila-rojgar-yojana/
