name_en: Mukhyamantri Mahila Rojgar Yojana
name_hi: मुख्यमंत्री महिला रोज़गार योजना
department_en: Industries Department, Government of Bihar
department_hi: उद्योग विभाग, बिहार सरकार
department_website: https://industries.bihar.gov.in
categories:
  - employment
  - women_child
  - financial_inclusion
objective_en: Stipend, micro-enterprise support and skilling for women to start livelihoods.
objective_hi: महिलाओं को आजीविका शुरू करने हेतु भत्ता, सूक्ष्म-उद्यम सहायता एवं कौशल।
eligibility_en: Women of Bihar (priority to SHG/Jeevika members); details to verify at source.
eligibility_hi: बिहार की महिलाएँ (स्वयं सहायता समूह/जीविका सदस्यों को प्राथमिकता); विवरण स्रोत से सत्यापित करें।
benefit_type: Stipend + enterprise support
benefit_detail: >-
  One-time ₹10,000 startup grant per woman (DBT), plus an optional top-up of up to ₹2 lakh for
  ventures showing progress after ~6 months. Delivered via the JEEViKA / SHG network.
target_beneficiary: Women of Bihar.
