objective_en: Assistance to rural houseless / kutcha-house families to build a pucca house.
objective_hi: ग्रामीण बेघर/कच्चे-मकान परिवारों को पक्का मकान बनाने हेतु सहायता।
eligibility_en: Rural families without a pucca house, identified per SECC/Awas+ lists.
