max_age: null
income_ceiling: null
requires_bpl: false
domicile: any
is_for_disabled: false
is_for_startups: false
land_ownership: raiyat
status: active
status_evidence: >-
  Active — 22nd installment released 13 Mar 2026 (₹18,640 cr to 9.32 crore farmers; cumulative
  >₹4.27 lakh crore, per PIB); 23rd installment scheduled 20 Jun 2026. ₹6,000/year in three ₹2,000
  installments; eKYC mandatory. Verified 2026-06-19. Source: https://pmkisan.gov.in/
last_notification_date: '2026-03-13'
source_url: https://pmkisan.gov.in
application_portal_url: https://pmkisan.gov.in
