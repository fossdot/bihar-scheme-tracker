name_en: Bihar State Housing Board — Housing Allotment (e-Lottery)
name_hi: बिहार राज्य आवास बोर्ड — आवास आवंटन (ई-लॉटरी)
department_en: Bihar State Housing Board, Urban Development & Housing Department, Government of Bihar
department_hi: बिहार राज्य आवास बोर्ड, नगर विकास एवं आवास विभाग, बिहार सरकार
department_website: https://bshb.bihar.gov.in/
categories:
  - housing
  - social_welfare
launch_date: null
objective_en: >-
  The Bihar State Housing Board (a statutory body established in 1972) develops integrated
  residential colonies — plots, flats and apartments across income categories (EWS / LIG / MIG /
  HIG) — and allots dwelling units to the public through a transparent online e-lottery. It also
  runs property e-auctions and lease-hold to free-hold conversion for existing allottees.
objective_hi: >-
  बिहार राज्य आवास बोर्ड (1972 में स्थापित एक सांविधिक निकाय) सभी आय वर्गों (EWS / LIG / MIG / HIG)
  हेतु एकीकृत आवासीय कॉलोनियाँ — भूखंड, फ्लैट एवं अपार्टमेंट — विकसित करता है तथा पारदर्शी ऑनलाइन
  ई-लॉटरी के माध्यम से आम जनता को आवास आवंटित करता है। यह संपत्ति की ई-नीलामी तथा मौजूदा आवंटियों
  हेतु लीज-होल्ड से फ्री-होल्ड रूपांतरण भी करता है।
eligibility_en: >-
  Open to the general public across income categories (EWS / LIG / MIG / HIG). Income eligibility
  for a given unit is set by the prevailing policy and stated in each project's advertisement /
  brochure. Key rule: if the applicant or any family member has already been allotted a dwelling
  unit or residential plot in any BSHB project, they are not eligible to apply again in a subsequent
  project. Applications are submitted online and units allotted by e-lottery.
eligibility_hi: >-
  सभी आय वर्गों (EWS / LIG / MIG / HIG) की आम जनता हेतु खुला। किसी इकाई के लिए आय पात्रता प्रचलित
  नीति द्वारा निर्धारित होती है और प्रत्येक परियोजना के विज्ञापन / विवरणिका में दी जाती है। मुख्य
  नियम: यदि आवेदक या उसके परिवार के किसी सदस्य को बोर्ड की किसी परियोजना में पहले ही आवास इकाई या
  भूखंड आवंटित हो चुका है, तो वह किसी बाद की परियोजना हेतु पुनः आवेदन के पात्र नहीं हैं। आवेदन
  ऑनलाइन जमा होते हैं और इकाइयाँ ई-लॉटरी द्वारा आवंटित की जाती हैं।
benefit_type: Housing allotment (plot / flat / apartment)
benefit_detail: >-
  Allotment of a residential plot, flat or apartment in a Board-developed colony, priced by income
  category, via online application and e-lottery. EWS/LIG units are offered at subsidised rates.
  Existing allottees can apply for lease-hold to free-hold conversion; surplus/commercial units are
  sold through e-auction on the Bihar e-Procurement portal.
target_beneficiary: General public seeking housing across EWS / LIG / MIG / HIG income categories.
