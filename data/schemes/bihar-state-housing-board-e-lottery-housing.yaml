status: likely_active
status_evidence: >-
  Likely active — the Bihar State Housing Board (est. 1972) operates an active official portal
  (bshb.bihar.gov.in) carrying schemes, online application, e-auction and lease-to-freehold modules,
  and has ongoing procurement (300+ live e-tenders, plus a proposed residential complex at Ara under
  environmental clearance). No scheme-wise budget line is published for the Board (its allotment
  activity is largely self-financing), and a specific current allotment/e-lottery advertisement
  could not be confirmed at verification, so this is likely_active rather than active. Verified
  2026-06-25.
