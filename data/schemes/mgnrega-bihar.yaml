department_hi: ग्रामीण विकास विभाग, बिहार सरकार
department_website: https://rdd.bihar.gov.in
categories:
  - employment
  - social_welfare
objective_en: Guaranteed wage employment for rural households willing to do unskilled manual work.
objective_hi: अकुशल शारीरिक कार्य हेतु इच्छुक ग्रामीण परिवारों को गारंटीशुदा मज़दूरी रोज़गार।
eligibility_en: Adult members of rural households in Bihar with a job card.
eligibility_hi: जॉब कार्ड धारक बिहार के ग्रामीण परिवारों के वयस्क सदस्य।
benefit_type: Guaranteed wage employment
benefit_detail: >-
  Up to 100 days of guaranteed work per household per year at the notified daily wage. Verify the
  current wage rate.
target_beneficiary: Rural households of Bihar.
