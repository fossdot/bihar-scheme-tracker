objective_en: Free LPG (cooking gas) connection to women of poor / eligible households.
objective_hi: निर्धन/पात्र परिवारों की महिलाओं को नि:शुल्क एलपीजी (रसोई गैस) कनेक्शन।
eligibility_en: Adult woman of an eligible low-income household without an existing LPG connection.
eligibility_hi: पात्र निम्न-आय परिवार की वयस्क महिला जिसके पास पहले से एलपीजी कनेक्शन न हो।
benefit_type: Free LPG connection
benefit_detail: >-
  Free LPG connection with deposit support (₹1,700 / ₹950) plus first refill and stove; subsidy of
  ₹300 per 14.2 kg cylinder for up to 9 refills/year (FY2025-26).
target_beneficiary: Women of eligible low-income households.
