objective_en: Subsidy to rural SC/ST/EBC youth to buy a passenger vehicle for transport livelihood.
objective_hi: ग्रामीण SC/ST/EBC युवाओं को यात्री वाहन खरीदने हेतु अनुदान।
eligibility_en: Rural SC/ST/EBC residents of Bihar.
eligibility_hi: बिहार के ग्रामीण SC/ST/EBC निवासी।
benefit_type: Vehicle subsidy
benefit_detail: >-
  50% subsidy, capped at ₹1 lakh (standard 3/4-wheeler), ₹70,000 (e-rickshaw) or ₹2 lakh
  (ambulance), for SC/ST/EBC groups.
target_beneficiary: Rural SC/ST/EBC youth.
