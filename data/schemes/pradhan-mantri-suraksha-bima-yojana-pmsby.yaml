name_en: Pradhan Mantri Suraksha Bima Yojana (PMSBY)
name_hi: प्रधानमंत्री सुरक्षा बीमा योजना (PMSBY)
department_en: Government of India (Central Scheme)
department_hi: भारत सरकार (केंद्रीय योजना)
department_website: https://www.india.gov.in
categories:
  - financial_inclusion
  - social_welfare
objective_en: Affordable accident-insurance cover via a bank account.
objective_hi: बैंक खाते के माध्यम से किफायती दुर्घटना बीमा।
eligibility_en: Bank account holders aged 18–70 who auto-debit the premium.
eligibility_hi: 18–70 आयु के बैंक खाताधारक जो प्रीमियम ऑटो-डेबिट करें।
benefit_type: Accident insurance
benefit_detail: >-
  Accidental death/disability cover of ₹2 lakh for an annual premium of ₹20; bank-account holders
  aged 18–70.
target_beneficiary: Bank account holders (18–70).
