objective_en: Support to traditional artisans and craftspeople — recognition, skilling, toolkit and credit.
objective_hi: पारंपरिक शिल्पकारों एवं कारीगरों को सहायता — मान्यता, कौशल, टूलकिट एवं ऋण।
eligibility_en: >-
  Artisans/craftspeople in one of the notified trades (carpenter, blacksmith, potter, weaver, etc.);
  family/occupation criteria apply.
eligibility_hi: >-
  अधिसूचित व्यवसायों (बढ़ई, लोहार, कुम्हार, बुनकर आदि) के शिल्पकार/कारीगर; परिवार/व्यवसाय मानदंड
  लागू।
benefit_type: Skilling + toolkit + collateral-free loan
benefit_detail: >-
  ₹500/day training stipend, a ₹15,000 toolkit incentive, and collateral-free loans up to ₹3 lakh
  (₹1 lakh then ₹2 lakh) at 5% interest.
