name_en: Mukhyamantri Kanya Vivah Yojana
name_hi: मुख्यमंत्री कन्या विवाह योजना
department_en: Social Welfare Department, Government of Bihar
department_hi: समाज कल्याण विभाग, बिहार सरकार
department_website: https://state.bihar.gov.in/socialwelfare
categories:
  - social_welfare
  - women_child
objective_en: >-
  Financial assistance to economically weaker families for a daughter's marriage, and to promote
  marriage registration.
objective_hi: आर्थिक रूप से कमज़ोर परिवारों को बेटी के विवाह हेतु वित्तीय सहायता एवं विवाह पंजीकरण को बढ़ावा।
eligibility_en: >-
  Bride must be a resident of Bihar, at least 18 (groom at least 21), from a family with annual
  income up to ₹60,000. The marriage must be legally registered (and solemnised after 22 Nov 2007).
eligibility_hi: >-
  वधू बिहार निवासी, आयु कम से कम 18 (वर कम से कम 21), परिवार की वार्षिक आय ₹60,000 तक। विवाह विधिवत
  पंजीकृत हो (एवं 22 नवम्बर 2007 के बाद संपन्न)।
benefit_type: Cash assistance (DBT)
benefit_detail: >-
  One-time ₹5,000 to the bride (by DBT) on a registered marriage where the bride is 18+ (BPL
  family).
target_beneficiary: Daughters of economically weaker families in Bihar.
