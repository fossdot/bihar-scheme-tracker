name_en: Bihar Industrial Investment Promotion Package (BIPPP) 2025
name_hi: बिहार औद्योगिक निवेश प्रोत्साहन पैकेज (BIPPP) 2025
department_en: Industries Department, Government of Bihar
department_hi: उद्योग विभाग, बिहार सरकार
department_website: https://industries.bihar.gov.in
summary_en: >-
  Industrial promotion package approved by the state cabinet (Aug 2025): land concessions, capital
  subsidy up to 30%, interest subvention up to ₹40 cr, and free land allotment scaled to investment
  size (10 acres for >₹100 cr up to 25 acres for >₹1,000 cr). Cross-check details against the
  official notification.
summary_hi: >-
  राज्य कैबिनेट द्वारा स्वीकृत औद्योगिक प्रोत्साहन पैकेज (अगस्त 2025): भूमि रियायतें, 30% तक पूंजी
  सब्सिडी, ₹40 करोड़ तक ब्याज अनुदान, एवं निवेश-आकार के अनुसार नि:शुल्क भूमि आवंटन। विवरण आधिकारिक
  अधिसूचना से सत्यापित करें।
categories:
  - industry
policy_type: package
status: active
is_draft: false
source_url: >-
