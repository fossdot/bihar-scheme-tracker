name_en: Bihar Draft Rules under the Labour Codes, 2025
name_hi: श्रम संहिता के अंतर्गत बिहार प्रारूप नियम, 2025
department_en: Labour Resources Department, Government of Bihar
department_hi: श्रम संसाधन विभाग, बिहार सरकार
department_website: https://state.bihar.gov.in/labour
summary_en: >-
  Draft rules to operationalise the four central Labour Codes (Wages; Industrial Relations; Social
  Security; Occupational Safety, Health & Working Conditions) in Bihar. Notified for public
  objections and suggestions (an extended period was notified). Open for public comment — confirm
  the current deadline and submission address in the official notification.
summary_hi: >-
  बिहार में चार केंद्रीय श्रम संहिताओं (वेतन; औद्योगिक संबंध; सामाजिक सुरक्षा; व्यावसायिक सुरक्षा,
  स्वास्थ्य एवं कार्यदशा) को लागू करने हेतु प्रारूप नियम। आम जनता से आपत्ति एवं सुझाव हेतु अधिसूचित।
  टिप्पणी हेतु खुला — वर्तमान समय-सीमा व पता आधिकारिक अधिसूचना से सत्यापित करें।
categories:
  - employment
policy_type: rules
status: unknown
document_url: >-
  https://www.simpliance.in/India/LEI/govt_notification/Bihar/notification-regarding-draft-rules-of-various-labour-codes-2025-have-been-formulated-and-regarding-the-extended-period-for-objections-and-suggestions-from-the-general-public-as-per-the-provisions-of-the-code-hindi-version-8763
is_draft: true
consultation_url: https://state.bihar.gov.in/labour
how_to_comment_en: >-
  1. Read the draft rules (document link). 2. Write your objection/suggestion citing the specific
  rule number. 3. Send it to the Labour Resources Department, Government of Bihar, within the
  notified period. 4. Confirm the current deadline and exact submission address (email/post) in the
  official notification before sending.
how_to_comment_hi: >-
  1. प्रारूप नियम पढ़ें (दस्तावेज़ लिंक)। 2. संबंधित नियम संख्या का उल्लेख करते हुए अपनी
  आपत्ति/सुझाव लिखें। 3. इसे अधिसूचित अवधि के भीतर श्रम संसाधन विभाग, बिहार सरकार को भेजें। 4. भेजने
  से पूर्व वर्तमान समय-सीमा एवं सटीक पता (ईमेल/डाक) आधिकारिक अधिसूचना से सत्यापित करें।
source_url: >-
