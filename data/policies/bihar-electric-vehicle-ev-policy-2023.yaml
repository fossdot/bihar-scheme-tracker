name_en: Bihar Electric Vehicle (EV) Policy 2023
name_hi: बिहार इलेक्ट्रिक वाहन (EV) नीति 2023
department_en: Industries Department, Government of Bihar
department_hi: उद्योग विभाग, बिहार सरकार
department_website: https://industries.bihar.gov.in
summary_en: >-
  Aims for 15% EVs in all vehicle registrations by 2028. Offers up to 75% Motor Vehicle Tax subsidy
  and purchase incentives up to ₹1.25 lakh for the first 1,000 personal four-wheeler EVs, plus
  support for charging infrastructure.
summary_hi: >-
  2028 तक सभी वाहन पंजीकरण में 15% EV का लक्ष्य। 75% तक मोटर वाहन कर सब्सिडी एवं पहले 1,000 निजी
  चार-पहिया EV हेतु ₹1.25 लाख तक खरीद प्रोत्साहन, साथ ही चार्जिंग अवसंरचना हेतु सहायता।
categories:
