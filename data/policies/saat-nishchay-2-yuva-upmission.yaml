name_en: Saat Nishchay-2 — Yuva Upmission
name_hi: सात निश्चय-2 — युवा उपमिशन
department_en: Saat Nischay — Yuva Upmission (Government of Bihar)
department_hi: सात निश्चय — युवा उपमिशन (बिहार सरकार)
department_website: https://www.7nishchay-yuvaupmission.bihar.gov.in/
summary_en: >-
  Bihar's 'Seven Resolves' (Saat Nishchay) governance vision. The youth resolve drives
  higher-education access, a job-search allowance and employability skilling — delivered through the
  Student Credit Card, Self-Help Allowance (MNSSBY) and Kushal Yuva Program.
summary_hi: >-
  बिहार की 'सात निश्चय' शासन दृष्टि। युवा निश्चय उच्च शिक्षा तक पहुँच, रोज़गार-खोज भत्ता एवं
  रोज़गार-योग्यता कौशल को प्रेरित करता है — स्टूडेंट क्रेडिट कार्ड, स्वयं सहायता भत्ता (MNSSBY) एवं
  कुशल युवा कार्यक्रम के माध्यम से।
