name_en: Bihar Startup Policy 2022
name_hi: बिहार स्टार्टअप नीति 2022
department_en: Industries Department, Government of Bihar
department_hi: उद्योग विभाग, बिहार सरकार
department_website: https://industries.bihar.gov.in
summary_en: >-
  Framework to build Bihar's startup ecosystem: interest-free seed funding up to ₹10 lakh (₹10.5
  lakh for women; ₹11.5 lakh for SC/ST/PwD founders) over 10 years, a ₹3 lakh enhancement/training
  grant, plus mentoring and incubation support. Released against milestones.
summary_hi: >-
  बिहार के स्टार्टअप पारिस्थितिकी तंत्र हेतु रूपरेखा: 10 वर्ष के लिए ₹10 लाख तक ब्याज-मुक्त सीड
  फंडिंग (महिला ₹10.5 लाख; SC/ST/दिव्यांग ₹11.5 लाख), ₹3 लाख प्रशिक्षण/उन्नयन अनुदान, साथ ही
  मेंटरिंग व इन्क्यूबेशन सहायता।
categories:
