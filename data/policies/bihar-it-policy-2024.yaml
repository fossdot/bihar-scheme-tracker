name_en: Bihar IT Policy 2024
name_hi: बिहार आईटी नीति 2024
department_en: Department of Information Technology, Government of Bihar
department_hi: सूचना प्रौद्योगिकी विभाग, बिहार सरकार
department_website: https://it.bihar.gov.in
summary_en: >-
  Framework to attract investment and employment in IT/ITeS and ESDM. Offers fiscal incentives
  including up to 30% capital subsidy (capped at ₹30 cr), 10% interest subvention, 50% lease-rental
  subsidy, 25% power-tariff reimbursement, and EPF/ESI reimbursement — all for up to 5 years.
summary_hi: >-
  आईटी/आईटीईएस एवं ESDM क्षेत्र में निवेश व रोज़गार आकर्षित करने हेतु रूपरेखा। 30% तक पूंजी सब्सिडी
  (अधिकतम ₹30 करोड़), 10% ब्याज अनुदान, 50% लीज-किराया सब्सिडी, 25% बिजली-शुल्क प्रतिपूर्ति एवं
  EPF/ESI प्रतिपूर्ति — सभी 5 वर्ष तक।
categories:
  - industry
