# Production stack: app + Postgres (pgvector) + Caddy (HTTPS), for a real domain.
# Designed to sit behind Cloudflare (proxied / orange cloud), Cloudflare SSL mode "Full".
#
#   1. In .env set:  POSTGRES_PASSWORD=<strong>  and  SITE_ADDRESS=your.domain
#   2. docker compose -f docker-compose.prod.yml up -d --build
#
# Caddy owns ports 80/443 and reverse-proxies to the app (which stays internal to the
# compose network). The verified catalogue auto-seeds from deploy/initdb on first init.

# Cap container logs so json-file logs can't silently fill the (small) droplet disk:
# 3 × 10 MB per service. Applied to every service via the &logging anchor.
x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    logging: *logging
    environment:
      POSTGRES_USER: bihar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env (no insecure default)}
      POSTGRES_DB: bihar_scheme_tracker
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./deploy/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bihar -d bihar_scheme_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    logging: *logging
    environment:
      DATABASE_URL: postgres://bihar:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@db:5432/bihar_scheme_tracker
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *logging
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  db_data:
  caddy_data:
  caddy_config:
